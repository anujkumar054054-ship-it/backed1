<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Bright Wallet — Compact</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root{
      --bg: #14031f;
      --muted: rgba(230,205,255,0.75);
      --accent1: #c86bfa;
      --accent2: #a44bff;
      --accent3: #ff8b33;
      --accent4: #ffbf6e;
      --glass: rgba(255,255,255,0.03);
      --radius: 12px;
      font-family: 'Poppins', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      --shadow-strong: 0 20px 60px rgba(20,3,36,0.85);
      --credit-color: #4ade80;
      --debit-color: #f87171;
    }

    :root{
      --bg-center: #1E052E;
      --bg-edge: #0a0312;
      --radial-spot: rgba(200,107,250,0.10);
      --radial-spot-2: rgba(255,139,51,0.08);
    }

    html, body {
      height: 100%;
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #e8fff7;
      background: none;
      overflow-x: hidden;
    }

    body::before{
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(800px 400px at 50% 20%, var(--radial-spot) 0%, transparent 22%),
        radial-gradient(700px 350px at 10% 80%, var(--radial-spot-2) 0%, transparent 20%),
        linear-gradient(180deg, var(--bg-center) 0%, var(--bg-edge) 62%);
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      opacity: 1;
    }

    .app{ 
      position: relative; 
      z-index: 2;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* COMPACT HEADER */
    .compact-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      position: relative;
    }

    .profile-section {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .compact-avatar {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      background: linear-gradient(135deg, #8b5cf6, #c026d3);
      border: 2px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 22px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    .compact-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }

    .compact-user-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .compact-username {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      margin: 0;
    }

    .compact-username i {
      color: #ffd700;
      font-size: 14px;
    }

    .compact-handle {
      font-size: 12px;
      color: var(--muted);
      margin: 0;
    }

    .history-btn {
      padding: 8px 14px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(255,139,51,0.15), rgba(200,107,250,0.15));
      border: 1px solid rgba(255,139,51,0.25);
      color: #ffbf6e;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .history-btn:hover {
      background: linear-gradient(135deg, rgba(255,139,51,0.25), rgba(200,107,250,0.25));
      transform: translateY(-1px);
    }

    /* WALLET BALANCE CARD */
    .balance-card {
      background: linear-gradient(135deg, rgba(142, 45, 226, 0.25), rgba(74, 0, 224, 0.35));
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: var(--shadow-strong);
      backdrop-filter: blur(12px);
      margin-bottom: 8px;
    }

    .balance-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .balance-label {
      font-size: 13px;
      color: var(--muted);
    }

    .active-badge {
      padding: 4px 10px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(34,197,94,0.25), rgba(21,128,61,0.15));
      color: #4ade80;
      font-size: 11px;
      font-weight: 800;
      border: 1px solid rgba(34,197,94,0.35);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .balance-amount {
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .balance-amount .currency {
      font-size: 28px;
      opacity: 0.9;
    }

    /* TRANSACTION SECTION */
    .transaction-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .withdraw-btn {
      width: 100%;
      padding: 16px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #57cc03, #004f1c);
      border: 2px solid #174207;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.25s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25),
                  0 0 22px rgba(255,215,80,0.35) inset;
    }

    .withdraw-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.15);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35),
                  0 0 28px rgba(255,215,80,0.45) inset;
    }

    .withdraw-btn:active {
      transform: translateY(0);
    }

    .upi-section {
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(0,200,160,0.15));
      border-radius: var(--radius);
      padding: 12px;
      border: 1px solid rgba(0,255,200,0.25);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .upi-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .upi-icon {
      width: 30px;
      height: 30px;
      background: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .upi-icon img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .upi-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .upi-label {
      font-size: 11px;
      color: var(--muted);
    }

    .upi-id {
      font-size: 14px;
      font-weight: 800;
      color: #eafff7;
    }

    .upi-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .edit-upi-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #86ffcf;
      transition: all 0.2s ease;
    }

    .edit-upi-btn:hover {
      background: rgba(255,255,255,0.12);
      transform: scale(1.05);
    }

    /* REFERRAL SECTION */
    .referral-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      margin-bottom: 12px;
    }

    .referral-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 14px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-value {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 20px;
      font-weight: 900;
      color: #fff;
    }

    .stat-value i {
      font-size: 16px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
    }

    .income-stat i {
      color: #ffe29c;
    }

    .refers-stat i {
      color: #7ee787;
    }

    .referral-instruction {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 12px;
      text-align: center;
    }

    .referral-instruction b {
      color: #4ade80;
    }

    .referral-link-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: 'Roboto Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: #dffbf4;
      margin-bottom: 12px;
      word-break: break-all;
      text-align: center;
    }

    .referral-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .action-btn {
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .copy-btn {
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
      color: #eafcff;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .share-btn {
      background: linear-gradient(135deg, rgba(40,230,200,0.15), rgba(10,190,170,0.1));
      color: #86ffcf;
      border: 1px solid rgba(0,210,180,0.25);
    }

    .copy-btn:hover {
      background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.1));
      transform: translateY(-1px);
    }

    .share-btn:hover {
      background: linear-gradient(135deg, rgba(40,230,200,0.25), rgba(10,190,170,0.2));
      transform: translateY(-1px);
    }

    /* FOOTER */
    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      margin-top: 8px;
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    /* MODAL STYLES (Keep from original) */
    .modal-backdrop{
      position:fixed;
      inset:0;
      z-index:9999;
      display:none;
      align-items:center;
      justify-content:center;
      background: linear-gradient(180deg, rgba(0,6,10,0.72), rgba(0,0,0,0.9));
      backdrop-filter: blur(8px) saturate(140%);
      -webkit-backdrop-filter: blur(8px) saturate(140%);
      transition:opacity .26s ease;
    }

    .modal{
      width:460px;
      max-width:80%;
      border-radius:16px;
      padding:18px;
      background: linear-gradient(180deg, rgba(4,14,18,0.82), rgba(6,18,20,0.56)),
                  radial-gradient(1200px 300px at -10% -10%, rgba(0,200,165,0.015), transparent 10%);
      backdrop-filter: blur(14px) saturate(130%);
      -webkit-backdrop-filter: blur(14px) saturate(130%);
      border:1px solid rgba(0,210,180,0.10);
      box-shadow: 0 36px 120px rgba(0,6,12,0.9), 0 0 38px rgba(0,200,165,0.04) inset;
      transform: translateY(10px) scale(.98);
      opacity:0;
      transition:transform .26s cubic-bezier(.2,.9,.2,1),opacity .22s ease;
      position:relative;
      overflow:hidden;
    }

    .modal-backdrop.open{
      display:flex;
    }

    .modal-backdrop.open .modal{
      transform:translateY(0) scale(1);
      opacity:1;
    }

    .modal h3{
      margin:0 0 8px 0;
      font-size:18px;
      letter-spacing:0.2px;
      color:#e8fff7;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .app {
        padding: 12px;
      }
      
      .compact-avatar {
        width: 44px;
        height: 44px;
        font-size: 20px;
      }
      
      .compact-username {
        font-size: 16px;
      }
      
      .balance-amount {
        font-size: 32px;
      }
      
      .withdraw-btn {
        padding: 14px;
        font-size: 16px;
      }
      
      .referral-stats {
        gap: 12px;
      }
      
      .stat-value {
        font-size: 18px;
      }
    }

    @media (max-width: 350px) {
      .history-btn {
        padding: 6px 10px;
        font-size: 11px;
      }
      
      .compact-username {
        font-size: 15px;
      }
      
      .compact-handle {
        font-size: 11px;
      }
    }

    * {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent !important;
      -webkit-touch-callout: none;
    }

    button {
      outline: none !important;
      box-shadow: none !important;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- COMPACT HEADER -->
    <div class="compact-header">
      <div class="profile-section">
        <div class="compact-avatar" id="compactAvatar">
          <!-- Avatar will be loaded from Telegram -->
        </div>
        <div class="compact-user-info">
          <h2 class="compact-username" id="compactUsername">
            Loading...
            <i class="fa-solid fa-crown"></i>
          </h2>
          <p class="compact-handle" id="compactHandle">@username</p>
        </div>
      </div>
      <button class="history-btn" id="compactHistoryBtn">
        <i class="fa-solid fa-history"></i>
        History
      </button>
    </div>

    <!-- WALLET BALANCE CARD -->
    <div class="balance-card">
      <div class="balance-header">
        <span class="balance-label">Wallet Balance</span>
        <span class="active-badge">Active</span>
      </div>
      <div class="balance-amount">
        <span class="currency">₹</span>
        <span id="compactBalance">0.00</span>
      </div>
    </div>

    <!-- TRANSACTION SECTION -->
    <div class="transaction-section">
      <button class="withdraw-btn" id="compactWithdrawBtn">
        <i class="fa-solid fa-right-from-bracket"></i>
        WITHDRAW
      </button>
      
      <div class="upi-section" id="upiSection" style="display: none;">
        <div class="upi-left">
          <div class="upi-icon">
            <img src="https://img.icons8.com/color/512/bhim.png" alt="UPI">
          </div>
          <div class="upi-info">
            <span class="upi-label">UPI Linked</span>
            <span class="upi-id" id="compactVpa">Loading...</span>
          </div>
        </div>
        <div class="upi-right">
          <div class="active-badge" style="font-size: 10px; padding: 3px 8px;">Active</div>
          <button class="edit-upi-btn" id="compactEditVpaBtn">
            <i class="fa-solid fa-pencil"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- REFERRAL SECTION -->
    <div class="referral-card">
      <div class="referral-stats">
        <div class="stat-item refers-stat">
          <div class="stat-value">
            <i class="fa-solid fa-user-plus"></i>
            <span id="compactTotalRefers">0</span>
          </div>
          <span class="stat-label">Total Refers</span>
        </div>
        <div class="stat-item income-stat">
          <div class="stat-value">
            <i class="fa-solid fa-wallet"></i>
            ₹<span id="compactReferralIncome">0.00</span>
          </div>
          <span class="stat-label">Referral Income</span>
        </div>
      </div>
      
      <p class="referral-instruction">
        You will earn <b>₹<span id="compactRewardPerRef">3</span></b> for each successful referral.
      </p>
      
      <div class="referral-link-box" id="compactInviteLink">
        Loading...
      </div>
      
      <div class="referral-actions">
        <button class="action-btn copy-btn" id="compactCopyBtn">
          <i class="fa-regular fa-copy"></i>
          Copy
        </button>
        <button class="action-btn share-btn" id="compactShareBtn">
          <i class="fa-solid fa-share-nodes"></i>
          Share
        </button>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      Share invite link, get ₹<span id="compactRefAmount">3.00</span> per friend. Withdrawals processed via linked VPA.
    </div>
  </div>

  <!-- MODAL BACKDROP (Same as original) -->
  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" id="modalContent">
      <h3 id="modalTitle">Title</h3>
      <div id="modalBody"></div>
      <div style="display:flex;gap:8px;margin-top:25px; margin-bottom:7px; justify-content:flex-end">
        <button class="btn-ghost" id="modalCancel"><i style="font-size:22px"class="fa-solid fa-xmark"></i></button>
        <button class="btn-prim" id="modalPrimary">OK</button>
      </div>
    </div>
  </div>

  <script>
    const notyf = new Notyf();
    
    // 🔧 IMPORTANT: Change these variables to match your bot
    const BOT_USERNAME = 'Zupee_Ludo_Upi_earni_bot'; // Change to your bot's username (without @)
    const API_BASE_URL = 'https://backed-nu.vercel.app/'; // Replace with your API base URL
    
    // Telegram WebApp instance
    const tg = window.Telegram?.WebApp;
    let chatId = '';
    let userData = null;
    let hasVpa = false;
    let userVpa = '';

    // DOM Elements for compact version
    const backdrop = document.getElementById('modalBackdrop');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const modalCancel = document.getElementById('modalCancel');
    const modalPrimary = document.getElementById('modalPrimary');
    
    const compactAvatar = document.getElementById('compactAvatar');
    const compactUsername = document.getElementById('compactUsername');
    const compactHandle = document.getElementById('compactHandle');
    const compactBalance = document.getElementById('compactBalance');
    const compactVpa = document.getElementById('compactVpa');
    const upiSection = document.getElementById('upiSection');
    const compactTotalRefers = document.getElementById('compactTotalRefers');
    const compactReferralIncome = document.getElementById('compactReferralIncome');
    const compactRewardPerRef = document.getElementById('compactRewardPerRef');
    const compactInviteLink = document.getElementById('compactInviteLink');
    const compactRefAmount = document.getElementById('compactRefAmount');
    
    const compactWithdrawBtn = document.getElementById('compactWithdrawBtn');
    const compactCopyBtn = document.getElementById('compactCopyBtn');
    const compactShareBtn = document.getElementById('compactShareBtn');
    const compactHistoryBtn = document.getElementById('compactHistoryBtn');
    const compactEditVpaBtn = document.getElementById('compactEditVpaBtn');

    // Set loading state
    function setLoadingState(isLoading) {
      if (isLoading) {
        document.body.classList.add('loading');
        compactWithdrawBtn.disabled = true;
        compactCopyBtn.disabled = true;
        compactShareBtn.disabled = true;
        compactHistoryBtn.disabled = true;
      } else {
        document.body.classList.remove('loading');
        compactWithdrawBtn.disabled = false;
        compactCopyBtn.disabled = false;
        compactShareBtn.disabled = false;
        compactHistoryBtn.disabled = false;
      }
    }

    // Initialize Telegram WebApp
    function initTelegramWebApp() {
      if (!tg) {
        console.warn('Telegram WebApp not available, using fallback data');
        chatId = '123456789';
        loadUserData(chatId);
        return;
      }

      tg.expand();
      
      const user = tg.initDataUnsafe?.user;
      
      if (user) {
        chatId = user.id.toString();
        
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('start') || urlParams.get('ref');
        
        updateCompactUserUI(user);
        initUserWithTelegramData(user, refCode);
      } else {
        notyf.error('Unable to get Telegram user data');
        setLoadingState(false);
      }
    }

    // Update compact UI with Telegram user info
    function updateCompactUserUI(telegramUser) {
      const displayName = telegramUser.first_name || telegramUser.username || 'User';
      compactUsername.innerHTML = `${displayName} <i class="fa-solid fa-crown"></i>`;
      
      if (telegramUser.username) {
        compactHandle.textContent = `@${telegramUser.username}`;
      } else {
        compactHandle.textContent = `ID: ${telegramUser.id}`;
      }
      
      if (telegramUser.photo_url) {
        compactAvatar.innerHTML = `<img src="${telegramUser.photo_url}" alt="${displayName}" />`;
      } else {
        const firstLetter = displayName.charAt(0).toUpperCase();
        compactAvatar.textContent = firstLetter;
      }
    }

    // Initialize user with Telegram data
    async function initUserWithTelegramData(telegramUser, refCode = null) {
      try {
        setLoadingState(true);
        
        const params = new URLSearchParams({
          chatId: chatId,
          username: telegramUser.username || '',
          avatar: telegramUser.photo_url || '',
          ...(refCode && { ref: refCode })
        });

        const response = await fetch(`${API_BASE_URL}/api/user/info?${params}`);
        const data = await response.json();

        if (data) {
          await loadUserData(chatId);
        } else {
          throw new Error('Failed to initialize user');
        }
      } catch (error) {
        console.error('Error initializing user:', error);
        notyf.error('Failed to initialize user');
      } finally {
        setLoadingState(false);
      }
    }

    // Load user data from API
    async function loadUserData(userId) {
      try {
        setLoadingState(true);
        
        const [userInfo, walletBalance, referralInfo, upiInfo] = await Promise.allSettled([
          fetch(`${API_BASE_URL}/api/user/info?chatId=${userId}`).then(r => r.json()),
          fetch(`${API_BASE_URL}/api/wallet/balance?chatId=${userId}`).then(r => r.json()),
          fetch(`${API_BASE_URL}/api/referral?chatId=${userId}`).then(r => r.json()),
          fetch(`${API_BASE_URL}/api/upi?chatId=${userId}`).then(r => r.json())
        ]);

        updateCompactUI({
          user: userInfo.value,
          balance: walletBalance.value,
          referral: referralInfo.value,
          upi: upiInfo.value
        });
        
      } catch (error) {
        console.error('Error loading user data:', error);
        notyf.error('Failed to load user data');
      } finally {
        setLoadingState(false);
      }
    }

    function updateCompactUI(data) {
      // Update balance
      if (data.balance?.balance) {
        compactBalance.textContent = parseFloat(data.balance.balance).toFixed(2);
      }
      
      // Withdraw button always enabled
      compactWithdrawBtn.disabled = false;
      compactWithdrawBtn.style.opacity = '1';
      compactWithdrawBtn.style.cursor = 'pointer';
      
      // Update referral stats
      if (data.referral) {
        compactTotalRefers.textContent = data.referral.total_referrals || 0;
        compactReferralIncome.textContent = data.referral.total_earned || '0.00';
        compactRewardPerRef.textContent = data.referral.commission_per_referral || '3';
        compactRefAmount.textContent = data.referral.commission_per_referral || '3.00';
        
        if (data.user?.referral_code) {
          compactInviteLink.textContent = `t.me/${BOT_USERNAME}?start=${data.user.referral_code}`;
        }
      }
      
      // Update UPI info
      if (data.upi?.vpa) {
        hasVpa = true;
        userVpa = data.upi.vpa;
        compactVpa.textContent = userVpa;
        upiSection.style.display = 'flex';
      } else {
        upiSection.style.display = 'none';
      }
    }

    // Modal functions
    function showModal(title, content, primaryText = 'OK', onPrimary = null) {
      modalTitle.innerText = title;
      modalBody.innerHTML = content;
      modalPrimary.innerText = primaryText;
      modalPrimary.onclick = () => {
        if (onPrimary) onPrimary();
        closeModal();
      };
      modalCancel.onclick = closeModal;
      backdrop.classList.add('open');
      setTimeout(() => {
        backdrop.style.display = 'flex';
      }, 6);
      document.addEventListener('keydown', escClose);
    }

    function closeModal() {
      backdrop.classList.remove('open');
      backdrop.style.display = 'none';
      modalBody.innerHTML = '';
      document.removeEventListener('keydown', escClose);
    }

    function escClose(e) { 
      if (e.key === 'Escape') closeModal(); 
    }

    // Withdraw button handler
    compactWithdrawBtn.addEventListener('click', async () => {
      if (!chatId) { 
        notyf.error('User not found'); 
        return; 
      }
      
      if (!hasVpa) {
        showVpaModal(false);
      } else {
        await showWithdrawModal();
      }
    });

    // VPA linking modal
    function showVpaModal(isEdit = false) {
      const title = isEdit ? 'Update UPI ID' : 'Link your UPI ID';
      const currentVpa = isEdit ? userVpa : '';
      
      const body = `
        <div style="margin-bottom:12px;display:flex;align-items:center;gap:10px;">
          <div style="width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, rgba(0,220,160,0.25), rgba(0,120,90,0.4));border:1px solid rgba(0,255,200,0.35);box-shadow:0 0 12px rgba(0,255,200,0.35);">
            <img src="https://img.icons8.com/color/512/bhim.png" style="width:26px;height:auto;opacity:0.9;" />
          </div>
          <div style="display:flex;flex-direction:column;">
            <div style="font-size:15px;font-weight:800;color:#e8fff7;">${title}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;">Example: <b>username@bank</b> or <b>mobile@upi</b></div>
          </div>
        </div>
        <div style="margin-top:10px;">
          <input id="vpaInput" class="vpa-input" 
                 placeholder="Enter your UPI ID" 
                 value="${currentVpa}"
                 style="width:100%;padding:14px;font-size:15px;font-weight:700;border-radius:14px;text-transform:lowercase;" />
        </div>
        <div style="display:flex;gap:6px;align-items:center;margin-top:8px;font-size:11px;color:rgba(200,240,230,0.7);">
          <i class="fa-solid fa-shield-halved" style="font-size:11px;opacity:0.8;"></i>
          <span>Your UPI is used only for receiving withdrawals securely.</span>
        </div>
      `;

      showModal(title, body, isEdit ? 'Update' : 'Submit', async () => {
        const vpaEl = document.getElementById('vpaInput');
        const vpa = vpaEl.value.trim().toLowerCase();
        
        if (!vpa) { 
          notyf.error('Please enter UPI ID'); 
          return; 
        }
        if (!vpa.includes('@')) { 
          notyf.error('Invalid UPI ID format'); 
          return; 
        }

        if (isEdit && vpa === userVpa) {
          closeModal();
          return;
        }

        setLoadingState(true);
        
        try {
          const response = await fetch(`${API_BASE_URL}/api/upi?chatId=${chatId}&vpa=${encodeURIComponent(vpa)}`);
          const data = await response.json();
          
          if (data) {
            notyf.success(isEdit ? 'UPI updated successfully' : 'UPI linked successfully');
            hasVpa = true;
            userVpa = vpa;
            compactVpa.textContent = vpa;
            upiSection.style.display = 'flex';
            closeModal();
          } else {
            notyf.error(isEdit ? 'Failed to update UPI' : 'Failed to link UPI');
          }
        } catch (error) {
          notyf.error('Network error. Please try again.');
        } finally {
          setLoadingState(false);
        }
      });
    }

    // Withdraw modal with amount structure
    async function showWithdrawModal() {
      const currentBalance = parseFloat(compactBalance.textContent) || 0;
      
      const amountOptions = [
        {requested: 15, receives: 10, fee: 5},
        {requested: 30, receives: 24, fee: 6},
        {requested: 50, receives: 40, fee: 10},
        {requested: 100, receives: 80, fee: 20}
      ];
      
      let selectedOption = null;
      
      const grid = amountOptions
        .map((option, index) => {
          const canAfford = currentBalance >= option.requested;
          const disabledClass = !canAfford ? 'disabled-amount' : '';
          const disabledStyle = !canAfford ? 'opacity:0.5; cursor:not-allowed;' : '';
          
          return `
            <div class="amount-item ${disabledClass}" 
                 data-index="${index}"
                 style="padding:12px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);text-align:center;cursor:pointer;${disabledStyle}"
                 ${!canAfford ? 'onclick="event.preventDefault();"' : ''}>
              <div style="font-size:18px;font-weight:900;color:#fff;">₹${option.requested}</div>
              <div style="font-size:11px;color:${canAfford ? '#7ee787' : '#ffb3b3'}">
                Get: ₹${option.receives}
              </div>
            </div>
          `;
        }).join('');
      
      const body = `
        <div style="margin-bottom:12px;display:flex;align-items:center;gap:8px;">
          <div style="width:26px;height:26px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle, rgba(0,255,200,0.22), rgba(0,40,35,0.9));border:1px solid rgba(180,255,235,0.9);box-shadow:0 0 10px rgba(0,255,200,0.5);font-size:14px;font-weight:900;color:#eafffb;">₹</div>
          <div>
            <div style="font-size:15px;font-weight:800;color:#e8fff7;">Select withdrawal amount</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;">
              Available: <span style="color:#7ee787;font-weight:700;">₹${currentBalance.toFixed(2)}</span>
            </div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:16px 0;">${grid}</div>
        
        <div id="chargeBox" style="margin-top:14px;padding:12px;border-radius:12px;background:rgba(0,255,200,0.05);border:1px solid rgba(0,210,180,0.25);display:none;">
          <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#aad5c7;margin-bottom:8px;">
            <span>Requested Amount</span>
            <span id="selAmt" style="font-weight:800;">₹0</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#ffb3b3;margin-bottom:8px;">
            <span>Processing Fee</span>
            <span id="feeAmount">- ₹0</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:900;color:#7ee787;">
            <span>You'll Receive</span>
            <span id="youGet">₹0</span>
          </div>
        </div>
        
        <div style="margin-top:12px;padding:10px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">
            <i class="fa-solid fa-info-circle"></i> Withdrawal Options:
          </div>
          <div style="font-size:11px;color:#e8fff7;display:grid;grid-template-columns:1fr 1fr;gap:4px;">
            <div>₹15 → Get ₹10 (Fee: ₹5)</div>
            <div>₹30 → Get ₹24 (Fee: ₹6)</div>
            <div>₹50 → Get ₹40 (Fee: ₹10)</div>
            <div>₹100 → Get ₹80 (Fee: ₹20)</div>
          </div>
        </div>
      `;

      showModal('Withdraw', body, 'Withdraw', async () => {
        if (!selectedOption) { 
          notyf.error('Please select an amount'); 
          return; 
        }
        
        const requestedAmount = selectedOption.requested;
        const receivesAmount = selectedOption.receives;
        const feeAmount = selectedOption.fee;
        
        setLoadingState(true);
        
        try {
          const response = await fetch(`${API_BASE_URL}/api/withdraw/initiate`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              chatId: chatId,
              amount: requestedAmount,
              netAmount: receivesAmount,
              fee: feeAmount,
              vpa: userVpa
            })
          });
          
          const data = await response.json();
          
          if (data.success) {
            notyf.success('Withdrawal request submitted successfully');
            notyf.success({
              message: `Withdrawal initiated! You'll receive ₹${receivesAmount} in 24 hours`,
              duration: 4000
            });
            
            await loadUserData(chatId);
            closeModal();
          } else {
            notyf.success('Withdrawal request submitted successfully');
          }
        } catch (error) {
          notyf.success('Withdrawal request submitted successfully');
        } finally {
          setLoadingState(false);
        }
      });

      setTimeout(() => {
        const chargeBox = document.getElementById('chargeBox');
        const selAmt = document.getElementById('selAmt');
        const feeAmount = document.getElementById('feeAmount');
        const youGet = document.getElementById('youGet');
        
        document.querySelectorAll('.amount-item:not(.disabled-amount)').forEach(item => {
          item.addEventListener('click', () => {
            const index = parseInt(item.dataset.index);
            selectedOption = amountOptions[index];
            
            document.querySelectorAll('.amount-item').forEach(i => i.style.background = 'rgba(255,255,255,0.05)');
            
            item.style.background = 'rgba(0,210,180,0.2)';
            item.style.border = '1px solid rgba(0,255,200,0.4)';
            
            chargeBox.style.display = 'block';
            selAmt.textContent = `₹${selectedOption.requested}`;
            feeAmount.textContent = `- ₹${selectedOption.fee}`;
            youGet.textContent = `₹${selectedOption.receives}`;
          });
        });
      }, 10);
    }

    // Copy invite link
    compactCopyBtn.addEventListener('click', async () => {
      const link = compactInviteLink.textContent;
      if (link === 'Loading...') {
        notyf.error('Link not available yet');
        return;
      }
      
      try {
        await navigator.clipboard.writeText(link);
        notyf.success('Link copied to clipboard');
      } catch (error) {
        notyf.error('Failed to copy link');
      }
    });

    // Share invite link
    compactShareBtn.addEventListener('click', () => {
      const link = compactInviteLink.textContent;
      if (link === 'Loading...') {
        notyf.error('Link not available yet');
        return;
      }
      
      const message = `🔥 Join me and earn money! Sign up with my link: ${link}`;
      
      if (navigator.share) {
        navigator.share({
          title: 'Join Now',
          text: message,
          url: link
        });
      } else if (tg?.shareUrl) {
        tg.shareUrl(message, link);
      } else {
        window.open(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(message)}`, '_blank');
      }
    });

    // Withdrawal History
    compactHistoryBtn.addEventListener('click', () => {
      if (!chatId) { 
        notyf.error('User not found'); 
        return; 
      }
      loadWithdrawalHistory();
    });

    // Edit VPA
    compactEditVpaBtn?.addEventListener('click', () => {
      showVpaModal(true);
    });

    // Load withdrawal history
    async function loadWithdrawalHistory() {
      try {
        setLoadingState(true);
        
        const response = await fetch(`${API_BASE_URL}/api/withdraw/history?chatId=${chatId}`);
        const data = await response.json();
        
        if (data.withdrawals && data.withdrawals.length > 0) {
          showWithdrawalHistory(data.withdrawals);
        } else {
          showModal('Withdrawal History', '<div style="text-align:center;padding:20px;color:var(--muted);">No withdrawal history found.</div>');
        }
      } catch (error) {
        console.error('Error loading withdrawal history:', error);
        notyf.error('Failed to load withdrawal history');
      } finally {
        setLoadingState(false);
      }
    }

    // Show withdrawal history
    function showWithdrawalHistory(withdrawals) {
      let historyHtml = `
        <div style="max-height:400px;overflow-y:auto;padding-right:10px;">
          <div style="margin-bottom:16px;color:var(--muted);font-size:13px;">
            Showing ${withdrawals.length} withdrawal${withdrawals.length > 1 ? 's' : ''}
          </div>
      `;
      
      withdrawals.forEach(wd => {
        const statusClass = wd.status === 'completed' ? 'status-completed' : 'status-pending';
        const initiatedDate = new Date(wd.initiated_at).toLocaleDateString('en-IN', {
          day: 'numeric',
          month: 'short',
          hour: '2-digit',
          minute: '2-digit'
        });
        
        historyHtml += `
          <div style="padding:12px;margin-bottom:10px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <div style="font-size:11px;color:var(--muted);">ID: ${wd.id.slice(-8)}</div>
              <div style="padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;background:${wd.status === 'completed' ? 'rgba(34,197,94,0.15)' : 'rgba(250,204,21,0.15)'};color:${wd.status === 'completed' ? '#4ade80' : '#facc15'};">
                ${wd.status}
              </div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div>
                <div style="font-size:20px;font-weight:800;color:#e8fff7;">₹${wd.amount}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:2px;">to ${wd.vpa}</div>
              </div>
              <div style="text-align:right;">
                <div style="font-size:16px;font-weight:800;color:#4ade80;">₹${wd.net_amount}</div>
                <div style="font-size:10px;color:#f87171;">-₹${wd.fee} fee</div>
              </div>
            </div>
            <div style="font-size:10px;color:var(--muted);margin-top:8px;text-align:right;">
              ${initiatedDate}
            </div>
          </div>
        `;
      });
      
      historyHtml += '</div>';
      
      showModal('Withdrawal History', historyHtml, 'Close');
    }

    // Initialize on load
    document.addEventListener('DOMContentLoaded', () => {
      initTelegramWebApp();
    });
  </script>
</body>
</html>
